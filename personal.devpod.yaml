schema_version: 0
flavor: go
region: oregon
shell: zsh
packages:
  - curl
repositories:
  - repo: https://github.com/romkatv/powerlevel10k.git
    dest: /tmp/powerlevel10k # Temp folder because oh-my-zsh wants empty .oh-my-zsh
tasks:  
  - name: Install Oh My zsh
    command: sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)"
    when: on-create
  - name: Install Meslo fonts
    command: sudo wget -P /usr/local/share/fonts \
        "https://github.com/romkatv/powerlevel10k-media/raw/master/MesloLGS%20NF%20Regular.ttf" \
        "https://github.com/romkatv/powerlevel10k-media/raw/master/MesloLGS%20NF%20Bold.ttf" \
        "https://github.com/romkatv/powerlevel10k-media/raw/master/MesloLGS%20NF%20Italic.ttf" \
        "https://github.com/romkatv/powerlevel10k-media/raw/master/MesloLGS%20NF%20Bold%20Italic.ttf" && \
        fc-cache -fv
    when: on-create
  - name: Download zsh-autosuggestions
    command: git clone https://github.com/zsh-users/zsh-autosuggestions.git /home/user/.oh-my-zsh/custom/plugins/zsh-autosuggestions 
    when: on-create
  - name: Download zsh-syntax-higlighting
    command: git clone https://github.com/zsh-users/zsh-syntax-highlighting.git /home/user/.oh-my-zsh/custom/plugins/zsh-syntax-highlighting
    when: on-create
  - name: Download zsh-completions
    command: git clone https://github.com/zsh-users/zsh-completions /home/user/.oh-my-zsh/custom/plugins/zsh-completions
    when: on-create
  - name: Download custom git completions
    command: curl -fsSL https://github.com/manuvimal/devpod-config/raw/main/.zsh_custom_completions -o ~/.zsh_custom_completions
    when: on-create
  - name: Move power10k repo
    command: mv /tmp/powerlevel10k /home/user/.oh-my-zsh/custom/themes/powerlevel10k
    when: on-create
  - name: Replace p10k config
    command: curl -fsSL https://github.com/manuvimal/devpod-config/raw/main/.p10k.zsh -o ~/.p10k.zsh
    when: on-create
  - name: Replace zsh config
    command: curl -fsSL https://github.com/manuvimal/devpod-config/raw/main/.zshrc -o ~/.zshrc
    when: on-create
  - name: Set time zone
    command: sudo ln -sf /usr/share/zoneinfo/America/Los_Angeles /etc/localtime
    when: on-create, on-restart
  - name: Install tmux
    command: sudo apt install tmux -y
    when: on-create
  - name: Add tmux config
    command: curl -fsSL https://github.com/manuvimal/devpod-config/raw/main/.tmux.conf -o ~/.tmux.conf
    when: on-create
  - name: Install TPM and tmux plugins
    command: |
      git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
      tmux new-session -d -s setup
      tmux source-file ~/.tmux.conf
      ~/.tmux/plugins/tpm/bin/install_plugins
      tmux kill-session -t setup
    when: on-create
  - name: Install initium script
    command: |
      mkdir -p ~/bin
      curl -fsSL https://github.com/manuvimal/devpod-config/raw/main/initium -o ~/bin/initium
      chmod +x ~/bin/initium
    when: on-create
  - name: Install Claude agents
    command: |
      mkdir -p /home/user/go-code/.claude/agents
      curl -fsSL https://github.com/manuvimal/devpod-config/raw/main/agents/lets-begin.md -o /home/user/go-code/.claude/agents/lets-begin.md
      curl -fsSL https://github.com/manuvimal/devpod-config/raw/main/agents/lomax-it.md -o /home/user/go-code/.claude/agents/lomax-it.md
      curl -fsSL https://github.com/manuvimal/devpod-config/raw/main/agents/strip-test.md -o /home/user/go-code/.claude/agents/strip-test.md
    when: on-create
  - name: Install Claude tmux notification hook
    command: |
      mkdir -p ~/.claude/hooks
      curl -fsSL https://github.com/manuvimal/devpod-config/raw/main/tmux-notify.sh -o ~/.claude/hooks/tmux-notify.sh
      chmod +x ~/.claude/hooks/tmux-notify.sh
    when: on-create
  - name: Add git diffs alias
    command: git config --global alias.diffs "-c delta.side-by-side=true diff"
    when: on-create
  - name: Install delta (side-by-side git diffs)
    command: |
      mkdir -p ~/.local/bin
      DELTA_VERSION=$(curl -fsSL https://api.github.com/repos/dandavison/delta/releases/latest | python3 -c "import sys,json; print(json.load(sys.stdin)['tag_name'])")
      curl -fsSL "https://github.com/dandavison/delta/releases/download/${DELTA_VERSION}/delta-${DELTA_VERSION}-x86_64-unknown-linux-musl.tar.gz" | \
        tar -xz --strip-components=1 -C ~/.local/bin "delta-${DELTA_VERSION}-x86_64-unknown-linux-musl/delta"
    when: on-create
